<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="1200" y2="0" stroke="white" stroke-width="1"/>
    <line x1="0" y1="100" x2="1200" y2="100" stroke="white" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="white" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="white" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="white" stroke-width="1"/>
    <line x1="0" y1="600" x2="1200" y2="600" stroke="white" stroke-width="1"/>
  </g>

  <!-- Logo icon -->
  <g transform="translate(80, 200)">
    <rect width="80" height="80" rx="18" fill="white" fill-opacity="0.15"/>
    <rect x="18" y="16" width="36" height="46" rx="4" fill="white" fill-opacity="0.9"/>
    <rect x="24" y="26" width="18" height="2" rx="1" fill="#6366f1" fill-opacity="0.4"/>
    <rect x="24" y="32" width="24" height="2" rx="1" fill="#6366f1" fill-opacity="0.3"/>
    <rect x="24" y="38" width="20" height="2" rx="1" fill="#6366f1" fill-opacity="0.3"/>
    <rect x="24" y="44" width="22" height="2" rx="1" fill="#6366f1" fill-opacity="0.25"/>
    <circle cx="52" cy="52" r="10" fill="url(#logoGrad)"/>
    <path d="M52 44 L53 49.5 L58.5 50.5 L53 51.5 L52 57 L51 51.5 L45.5 50.5 L51 49.5 Z" fill="white"/>
  </g>

  <!-- App name -->
  <text x="180" y="248" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="white" letter-spacing="-1">CatalogAI</text>

  <!-- Tagline -->
  <text x="82" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="500" fill="white" fill-opacity="0.85">Your Supplier Intelligence Platform</text>

  <!-- Feature pills -->
  <g transform="translate(82, 360)">
    <rect width="180" height="36" rx="18" fill="white" fill-opacity="0.15"/>
    <text x="90" y="23" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white" fill-opacity="0.9" text-anchor="middle">Catalog Extraction</text>
  </g>
  <g transform="translate(280, 360)">
    <rect width="200" height="36" rx="18" fill="white" fill-opacity="0.15"/>
    <text x="100" y="23" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white" fill-opacity="0.9" text-anchor="middle">Price Comparison</text>
  </g>
  <g transform="translate(498, 360)">
    <rect width="200" height="36" rx="18" fill="white" fill-opacity="0.15"/>
    <text x="100" y="23" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white" fill-opacity="0.9" text-anchor="middle">Scheme Tracking</text>
  </g>
  <g transform="translate(716, 360)">
    <rect width="200" height="36" rx="18" fill="white" fill-opacity="0.15"/>
    <text x="100" y="23" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white" fill-opacity="0.9" text-anchor="middle">Smart Procurement</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="black" fill-opacity="0.2"/>
  <text x="82" y="612" font-family="system-ui, sans-serif" font-size="16" font-weight="500" fill="white" fill-opacity="0.6">catalogai.in</text>
</svg>

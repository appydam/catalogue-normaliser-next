<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="pageGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#4f46e5" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="200" height="200" rx="44" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Back page (slightly rotated) -->
  <g transform="rotate(-8, 100, 105)">
    <rect x="54" y="46" width="74" height="96" rx="8" fill="white" fill-opacity="0.13"/>
  </g>

  <!-- Mid page -->
  <g transform="rotate(-3, 100, 105)">
    <rect x="58" y="50" width="74" height="96" rx="8" fill="white" fill-opacity="0.18"/>
  </g>

  <!-- Front page -->
  <rect x="62" y="54" width="74" height="96" rx="8" fill="white" fill-opacity="0.95"/>

  <!-- Page lines -->
  <rect x="74" y="72" width="38" height="3.5" rx="1.75" fill="#6366f1" fill-opacity="0.25"/>
  <rect x="74" y="82" width="50" height="3.5" rx="1.75" fill="#6366f1" fill-opacity="0.18"/>
  <rect x="74" y="92" width="44" height="3.5" rx="1.75" fill="#6366f1" fill-opacity="0.18"/>
  <rect x="74" y="102" width="48" height="3.5" rx="1.75" fill="#6366f1" fill-opacity="0.15"/>
  <rect x="74" y="112" width="36" height="3.5" rx="1.75" fill="#6366f1" fill-opacity="0.15"/>

  <!-- AI sparkle badge (bottom-right corner of page) -->
  <circle cx="122" cy="130" r="16" fill="url(#bgGrad)"/>

  <!-- 4-point star sparkle -->
  <path d="M122 118 L123.8 126.2 L132 128 L123.8 129.8 L122 138 L120.2 129.8 L112 128 L120.2 126.2 Z" fill="white"/>
</svg>
